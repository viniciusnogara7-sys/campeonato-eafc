<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

const COLOR_PALETTE = ["#6366f1","#f59e0b","#10b981","#ef4444","#3b82f6","#8b5cf6","#ec4899","#14b8a6","#f97316","#84cc16","#06b6d4","#a855f7","#f43f5e","#22c55e","#eab308","#64748b"];

// ── Firebase ──────────────────────────────────────────────────────────────────
function fbSave(t) { db.ref("tournaments/"+t.id).set(t); }
function fbDelete(id) { db.ref("tournaments/"+id).remove(); }
function fbWatch(id, cb) {
  const ref = db.ref("tournaments/"+id);
  ref.on('value', s => cb(s.val()));
  return () => ref.off();
}
function fbWatchAll(cb) {
  const ref = db.ref("tournaments");
  ref.on('value', s => {
    const val = s.val();
    cb(val ? Object.values(val).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)) : []);
  });
  return () => ref.off();
}

// ── Utilitários ───────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function generateSmartMatches(players, numConsoles) {
  let all=[];
  for(let i=0;i<players.length;i++)
    for(let j=i+1;j<players.length;j++)
      all.push([players[i],players[j]]);
  all=shuffle(all);
  const ordered=[], last=[];
  while(all.length>0){
    let idx=-1;
    for(let i=0;i<all.length;i++){
      const [p1,p2]=all[i];
      if(last.filter(p=>p===p1).length<2 && last.filter(p=>p===p2).length<2){idx=i;break;}
    }
    if(idx===-1)idx=0;
    const m=all.splice(idx,1)[0];
    ordered.push(m);
    last.push(m[0],m[1]);
    if(last.length>numConsoles*4)last.splice(0,2);
  }
  return ordered;
}

function getStats(playerList, results) {
  const stats={};
  playerList.forEach(p=>stats[p]={j:0,pts:0,v:0,e:0,d:0,gp:0,gc:0,sg:0});
  Object.entries(results||{}).forEach(([key,score])=>{
    if(score.ga===""||score.gb===""||score.ga===undefined)return;
    const [p1,p2]=key.split("_vs_");
    if(!stats[p1]||!stats[p2])return;
    stats[p1].j++;stats[p2].j++;
    stats[p1].gp+=score.ga;stats[p1].gc+=score.gb;
    stats[p2].gp+=score.gb;stats[p2].gc+=score.ga;
    if(score.ga>score.gb){stats[p1].pts+=3;stats[p1].v++;stats[p2].d++;}
    else if(score.ga<score.gb){stats[p2].pts+=3;stats[p2].v++;stats[p1].d++;}
    else{stats[p1].pts++;stats[p2].pts++;stats[p1].e++;stats[p2].e++;}
    stats[p1].sg=stats[p1].gp-stats[p1].gc;
    stats[p2].sg=stats[p2].gp-stats[p2].gc;
  });
  return Object.entries(stats).sort((a,b)=>b[1].pts-a[1].pts||b[1].sg-a[1].sg||b[1].gp-a[1].gp);
}

// ── Componentes base ──────────────────────────────────────────────────────────
function PlayerBadge({name,color,small}){
  const c=color||"#64748b";
  return <span style={{background:c+"22",border:`1.5px solid ${c}`,color:c,borderRadius:6,padding:small?"2px 5px":"3px 10px",fontWeight:700,fontSize:small?10:13,whiteSpace:"nowrap",display:"inline-block"}}>{name}</span>;
}

function Btn({children,onClick,color="#3b82f6",outline,small,disabled,danger,style}){
  const bg=danger?"#ef4444":outline?"transparent":color;
  const border=danger?"#ef4444":color;
  return <button onClick={onClick} disabled={disabled} style={{background:disabled?"#1e293b":bg,border:`1.5px solid ${disabled?"#334155":border}`,color:disabled?"#475569":outline?color:"#fff",borderRadius:8,padding:small?"6px 10px":"9px 18px",fontWeight:700,fontSize:small?11:14,cursor:disabled?"default":"pointer",whiteSpace:"nowrap",...style}}>{children}</button>;
}

// ── Home ──────────────────────────────────────────────────────────────────────
function HomeScreen({onNew,onLoad}){
  const [saved,setSaved]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    return fbWatchAll(list=>{setSaved(list);setLoading(false);});
  },[]);
  return (
    <div style={{maxWidth:600,margin:"0 auto",padding:"40px 16px"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:60}}>🎮</div>
        <h1 style={{margin:0,fontSize:32,fontWeight:900}}>EA FC 26 LOCAL</h1>
        <p style={{color:"#64748b"}}>Gestão Multi-Consoles Profissional</p>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,fontSize:11,color:"#10b981",marginTop:4}}>
          <span className="pulse" style={{width:7,height:7,borderRadius:"50%",background:"#10b981",display:"inline-block"}}></span>
          Dados compartilhados em tempo real
        </div>
      </div>
      <Btn onClick={onNew} color="#3b82f6" style={{width:"100%",marginBottom:24,padding:18,fontSize:16}}>＋ Criar Novo Torneio</Btn>
      {loading && <p style={{textAlign:"center",color:"#64748b"}}>Carregando...</p>}
      {!loading && saved.length===0 && <p style={{textAlign:"center",color:"#334155"}}>Nenhum torneio ainda. Crie o primeiro!</p>}
      {saved.map(t=>(
        <div key={t.id} className="card" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:800}}>{t.name}</div>
            <div style={{fontSize:11,color:"#64748b"}}>{t.type==='copa'?'Copa':'Liga'} · {t.players?.length} Jogadores · {t.numConsoles} Console(s)</div>
            {t.champion && <div style={{fontSize:11,color:"#fbbf24",marginTop:2}}>🏆 {t.champion}</div>}
          </div>
          <div style={{display:"flex",gap:6}}>
            <Btn small onClick={()=>onLoad(t)}>Abrir</Btn>
            <Btn small danger outline onClick={()=>{if(confirm("Excluir para todos?"))fbDelete(t.id);}}>🗑</Btn>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Setup ─────────────────────────────────────────────────────────────────────
function SetupScreen({onStart,onBack}){
  const [name,setName]=useState("");
  const [type,setType]=useState("liga");
  const [numPlayers,setNumPlayers]=useState(8);
  const [numConsoles,setNumConsoles]=useState(1);
  const [numClass,setNumClass]=useState(4);
  const [players,setPlayers]=useState(Array(8).fill("").map((_,i)=>`Jogador ${i+1}`));

  const handleNumChange=(n)=>{
    const v=Math.max(4,Math.min(32,n));
    setNumPlayers(v);
    setPlayers(prev=>{const nx=[...prev];while(nx.length<v)nx.push(`Jogador ${nx.length+1}`);return nx.slice(0,v);});
  };

  const handleStart=()=>{
    if(!name.trim())return alert("Dê um nome ao torneio!");
    const up=players.map(p=>p.trim()).filter(Boolean);
    if(up.length<numPlayers)return alert("Preencha todos os nomes!");
    const colors={};
    up.forEach((p,i)=>colors[p]=COLOR_PALETTE[i%COLOR_PALETTE.length]);
    let groups=null,ligaMatches=[];
    if(type==='copa'){
      const sh=shuffle(up);
      const gs=4,ng=Math.ceil(up.length/gs);
      groups={};
      for(let i=0;i<ng;i++){const gp=sh.slice(i*gs,(i+1)*gs);groups[String.fromCharCode(65+i)]={players:gp,matches:generateSmartMatches(gp,numConsoles)};}
    } else {
      ligaMatches=generateSmartMatches(up,numConsoles);
    }
    const t={id:Date.now().toString(),name,type,players:up,colors,groups:groups||null,ligaMatches:ligaMatches||[],numClassificados:numClass,numConsoles,results:{},bracket:null,champion:null,createdAt:Date.now()};
    fbSave(t);
    onStart(t);
  };

  return (
    <div style={{maxWidth:500,margin:"0 auto",padding:"40px 16px"}}>
      <Btn outline small onClick={onBack} style={{marginBottom:20}}>← Voltar</Btn>
      <div className="card">
        <h2 style={{margin:"0 0 20px"}}>Configuração</h2>
        <label style={{fontSize:11,color:"#64748b"}}>NOME DO TORNEIO</label>
        <input type="text" value={name} onChange={e=>setName(e.target.value)} style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:12,color:"#fff",marginBottom:16}}/>
        <label style={{fontSize:11,color:"#64748b"}}>FORMATO</label>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <Btn outline={type!=='copa'} onClick={()=>setType('copa')} style={{flex:1}}>Copa</Btn>
          <Btn outline={type!=='liga'} onClick={()=>setType('liga')} style={{flex:1}}>Liga</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <div>
            <label style={{fontSize:11,color:"#64748b"}}>JOGADORES: {numPlayers}</label>
            <input type="range" min="4" max="32" value={numPlayers} onChange={e=>handleNumChange(parseInt(e.target.value))} style={{width:"100%"}}/>
          </div>
          <div>
            <label style={{fontSize:11,color:"#64748b"}}>CONSOLES: {numConsoles}</label>
            <input type="range" min="1" max="8" value={numConsoles} onChange={e=>setNumConsoles(parseInt(e.target.value))} style={{width:"100%"}}/>
          </div>
        </div>
        <label style={{fontSize:11,color:"#64748b"}}>CLASSIFICADOS PARA O MATA-MATA</label>
        <select value={numClass} onChange={e=>setNumClass(Number(e.target.value))} style={{width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:12,color:"#fff",marginBottom:20}}>
          <option value={2}>Top 2 (Final)</option>
          <option value={4}>Top 4 (Semi)</option>
          <option value={8} disabled={numPlayers<8}>Top 8 (Quartas)</option>
          <option value={16} disabled={numPlayers<16}>Top 16 (Oitavas)</option>
        </select>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {players.map((p,i)=>(
            <input key={i} type="text" value={p} onChange={e=>{const n=[...players];n[i]=e.target.value;setPlayers(n);}} style={{background:"#0f172a",border:"1px solid #334155",borderRadius:6,padding:8,color:"#fff",fontSize:13}}/>
          ))}
        </div>
      </div>
      <Btn onClick={handleStart} color="#10b981" style={{width:"100%"}}>Iniciar Torneio 🎮</Btn>
    </div>
  );
}

// ── Tournament ────────────────────────────────────────────────────────────────
function TournamentApp({tournament,onBack}){
  const [tab,setTab]=useState("jogos");
  const [data,setData]=useState(tournament);
  const [saving,setSaving]=useState(false);
  const pdfRef=useRef();

  useEffect(()=>{
    return fbWatch(tournament.id,val=>{if(val)setData(val);});
  },[tournament.id]);

  const save=(newData)=>{
    setSaving(true);
    fbSave(newData);
    setTimeout(()=>setSaving(false),800);
  };

  const setScore=(key,ga,gb)=>{
    setData(prev=>{
      const next={...prev,results:{...prev.results,[key]:{ga:ga===""?"":Number(ga),gb:gb===""?"":Number(gb)}}};
      save(next);return next;
    });
  };

  const setBracketScore=(phase,index,ga,gb)=>{
    setData(prev=>{
      const nb=JSON.parse(JSON.stringify(prev.bracket));
      nb[phase][index].score={ga:ga===""?"":Number(ga),gb:gb===""?"":Number(gb)};
      const next={...prev,bracket:nb};save(next);return next;
    });
  };

  const goleadas=useMemo(()=>{
    const list=[];
    Object.entries(data.results||{}).forEach(([key,score])=>{
      if(score.ga===""||score.gb===""||score.ga===undefined)return;
      const [p1,p2]=key.split("_vs_");
      const diff=Math.abs(score.ga-score.gb);
      if(diff>=3)list.push({p1,p2,ga:score.ga,gb:score.gb,diff});
    });
    return list.sort((a,b)=>b.diff-a.diff).slice(0,10);
  },[data]);

  const initBracket=()=>{
    const qualified=[];
    if(data.type==='copa'){
      Object.keys(data.groups).sort().forEach(g=>{
        const s=getStats(data.groups[g].players,data.results);
        if(s.length>=1)qualified.push(s[0][0]);
        if(s.length>=2)qualified.push(s[1][0]);
      });
    } else {
      getStats(data.players,data.results).slice(0,data.numClassificados).forEach(x=>qualified.push(x[0]));
    }
    const fq=qualified.slice(0,data.numClassificados);
    if(fq.length<2)return alert("Jogadores insuficientes!");
    const phase=fq.length>=16?'oitavas':fq.length>=8?'quartas':fq.length>=4?'semi':'final';
    const matches=[];
    for(let i=0;i<fq.length/2;i++)matches.push({p1:fq[i],p2:fq[fq.length-1-i],score:{ga:"",gb:""}});
    const next={...data,bracket:{oitavas:phase==='oitavas'?matches:[],quartas:phase==='quartas'?matches:[],semi:phase==='semi'?matches:[],final:phase==='final'?matches:[]}};
    setData(next);save(next);setTab("mata-mata");
  };

  const advanceWinner=(phase,index)=>{
    const m=data.bracket[phase][index];
    if(m.score.ga===""||m.score.gb===""||m.score.ga===undefined)return alert("Insira o placar!");
    if(m.score.ga===m.score.gb)return alert("Mata-mata não pode empatar!");
    const winner=m.score.ga>m.score.gb?m.p1:m.p2;
    setData(prev=>{
      const nb=JSON.parse(JSON.stringify(prev.bracket));
      let champion=prev.champion;
      if(phase==='oitavas'){if(!nb.quartas||!nb.quartas.length)nb.quartas=Array(4).fill(null).map(()=>({p1:null,p2:null,score:{ga:"",gb:""}}));const ni=Math.floor(index/2);if(index%2===0)nb.quartas[ni].p1=winner;else nb.quartas[ni].p2=winner;}
      else if(phase==='quartas'){if(!nb.semi||!nb.semi.length)nb.semi=Array(2).fill(null).map(()=>({p1:null,p2:null,score:{ga:"",gb:""}}));const ni=Math.floor(index/2);if(index%2===0)nb.semi[ni].p1=winner;else nb.semi[ni].p2=winner;}
      else if(phase==='semi'){if(!nb.final||!nb.final.length)nb.final=[{p1:null,p2:null,score:{ga:"",gb:""}}];if(index===0)nb.final[0].p1=winner;else nb.final[0].p2=winner;}
      else{champion=winner;}
      const next={...prev,bracket:nb,champion};save(next);return next;
    });
  };

  const shareWhatsApp=()=>{
    let text=`*🏆 ${data.name.toUpperCase()}*\n\n*📊 CLASSIFICAÇÃO ATUAL*\n`;
    getStats(data.players,data.results).forEach(([p,s],i)=>{text+=`${i+1}º ${p} | ${s.pts}pts (${s.v}V, ${s.sg}SG)\n`;});
    if(data.champion)text+=`\n*👑 CAMPEÃO: ${data.champion.toUpperCase()}* 🏆`;
    window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`,'_blank');
  };

  const generatePDF=()=>{
    const opt={margin:0,filename:`tabela_${data.name}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{unit:'in',format:'letter',orientation:'landscape'}};
    html2pdf().set(opt).from(pdfRef.current).save();
  };

  return (
    <div style={{paddingBottom:100}}>
      <div style={{background:"#1e293b",padding:"12px 16px",borderBottom:"1px solid #334155",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",maxWidth:900,margin:"0 auto"}}>
          <Btn outline small onClick={onBack}>← Sair</Btn>
          <div style={{textAlign:"center"}}>
            <div style={{fontWeight:900,fontSize:14}}>{data.name}</div>
            <div style={{fontSize:10,color:saving?"#f59e0b":"#10b981"}}>{saving?"💾 Salvando...":"✅ Salvo · Todos veem em tempo real"}</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <Btn small color="#8b5cf6" onClick={generatePDF}>PDF 📄</Btn>
            <Btn small color="#25D366" onClick={shareWhatsApp}>Zap 📲</Btn>
          </div>
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"16px"}}>
        <div style={{display:"flex",gap:6,marginBottom:20,overflowX:"auto"}}>
          <Btn small outline={tab!=='jogos'} onClick={()=>setTab('jogos')}>🎮 Jogos</Btn>
          <Btn small outline={tab!=='tabela'} onClick={()=>setTab('tabela')}>📊 Tabela</Btn>
          <Btn small outline={tab!=='mata-mata'} onClick={()=>setTab('mata-mata')}>⚔️ Mata-Mata</Btn>
          <Btn small outline={tab!=='goleadas'} onClick={()=>setTab('goleadas')}>💥 Goleadas</Btn>
        </div>

        {tab==='jogos'&&(
          <div>
            <div className="card" style={{background:"#334155",border:"none"}}>
              <p style={{margin:0,fontSize:12,fontWeight:700}}>🚀 MODO MULTI-CONSOLE: {data.numConsoles} APARELHO(S) · Todos veem os placares em tempo real</p>
            </div>
            {(data.type==='copa'?Object.keys(data.groups||{}).sort():['LIGA']).map(g=>(
              <div key={g} className="card">
                <h3 style={{marginTop:0,fontSize:14,color:"#3b82f6"}}>{g==='LIGA'?'ORDEM DAS PARTIDAS':`GRUPO ${g}`}</h3>
                {(g==='LIGA'?data.ligaMatches:data.groups[g].matches).map(([p1,p2],idx)=>{
                  const key=`${p1}_vs_${p2}`,score=data.results?.[key]||{ga:"",gb:""};
                  return (
                    <div key={key} style={{display:"flex",alignItems:"center",gap:10,background:idx<data.numConsoles?"rgba(59,130,246,0.1)":"#0f172a",padding:8,borderRadius:8,marginBottom:6,border:idx<data.numConsoles?"1px solid #3b82f6":"1px solid transparent"}}>
                      <span className="console-badge">C{(idx%data.numConsoles)+1}</span>
                      <div style={{flex:1,textAlign:"right",fontSize:13}}>{p1}</div>
                      <input type="number" className="input-score" value={score.ga} onChange={e=>setScore(key,e.target.value,score.gb)}/>
                      <span>×</span>
                      <input type="number" className="input-score" value={score.gb} onChange={e=>setScore(key,score.ga,e.target.value)}/>
                      <div style={{flex:1,fontSize:13}}>{p2}</div>
                    </div>
                  );
                })}
              </div>
            ))}
            {!data.bracket&&<Btn onClick={initBracket} color="#8b5cf6" style={{width:"100%"}}>Iniciar Mata-Mata ⚔️</Btn>}
          </div>
        )}

        {tab==='tabela'&&(
          <div>
            {(data.type==='copa'?Object.keys(data.groups||{}).sort():['LIGA']).map(g=>(
              <div key={g} className="card">
                <h3 style={{marginTop:0,fontSize:14,color:"#3b82f6"}}>{g==='LIGA'?'CLASSIFICAÇÃO':`GRUPO ${g}`}</h3>
                <div style={{overflowX:"auto"}}>
                  <table>
                    <thead><tr><th align="left">Pos</th><th align="left">Jogador</th><th>J</th><th>PTS</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead>
                    <tbody>
                      {getStats(g==='LIGA'?data.players:data.groups[g].players,data.results).map(([p,s],i)=>(
                        <tr key={p}>
                          <td><span className="badge-pos" style={{background:i<data.numClassificados?"#10b981":"#334155"}}>{i+1}</span></td>
                          <td><PlayerBadge name={p} color={data.colors?.[p]} small/></td>
                          <td align="center">{s.j}</td><td align="center"><b>{s.pts}</b></td>
                          <td align="center">{s.v}</td><td align="center">{s.e}</td><td align="center">{s.d}</td>
                          <td align="center">{s.gp}</td><td align="center">{s.gc}</td><td align="center">{s.sg}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            ))}
          </div>
        )}

        {tab==='mata-mata'&&(
          <div>
            {data.bracket&&['oitavas','quartas','semi','final'].map(phase=>(
              data.bracket[phase]&&data.bracket[phase].length>0&&(
                <div key={phase} style={{marginBottom:24}}>
                  <h3 style={{textAlign:"center",textTransform:"uppercase",fontSize:12,color:"#3b82f6"}}>{phase}</h3>
                  {data.bracket[phase].map((m,i)=>(
                    <div key={i} className="card" style={{display:"flex",alignItems:"center",gap:10}}>
                      <span className="console-badge">C{(i%data.numConsoles)+1}</span>
                      <div style={{flex:1,textAlign:"right"}}>{m.p1?<PlayerBadge name={m.p1} color={data.colors?.[m.p1]}/>:"?"}</div>
                      <input type="number" className="input-score" value={m.score.ga} onChange={e=>setBracketScore(phase,i,e.target.value,m.score.gb)}/>
                      <span>×</span>
                      <input type="number" className="input-score" value={m.score.gb} onChange={e=>setBracketScore(phase,i,m.score.ga,e.target.value)}/>
                      <div style={{flex:1}}>{m.p2?<PlayerBadge name={m.p2} color={data.colors?.[m.p2]}/>:"?"}</div>
                      <Btn small onClick={()=>advanceWinner(phase,i)}>✓</Btn>
                    </div>
                  ))}
                </div>
              )
            ))}
            {data.champion&&(
              <div style={{textAlign:"center",padding:40,border:"3px solid #fbbf24",borderRadius:16,background:"rgba(251,191,36,0.05)"}}>
                <div style={{fontSize:60}}>🏆</div>
                <h2 style={{color:"#fbbf24",fontSize:32}}>{data.champion}</h2>
                <p style={{color:"#94a3b8"}}>GRANDE CAMPEÃO</p>
              </div>
            )}
            {!data.bracket&&<p style={{textAlign:"center",color:"#64748b"}}>Conclua a fase de grupos primeiro.</p>}
          </div>
        )}

        {tab==='goleadas'&&(
          <div className="card">
            <h3 style={{marginTop:0}}>💥 Maiores Goleadas (diferença ≥ 3)</h3>
            {goleadas.length===0
              ?<p style={{textAlign:"center",color:"#64748b"}}>Nenhuma goleada ainda.</p>
              :goleadas.map((g,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:12,background:"#0f172a",borderRadius:8,marginBottom:8}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <PlayerBadge name={g.p1} color={data.colors?.[g.p1]} small/>
                    <span style={{fontWeight:900}}>{g.ga} × {g.gb}</span>
                    <PlayerBadge name={g.p2} color={data.colors?.[g.p2]} small/>
                  </div>
                  <div style={{color:"#10b981",fontWeight:900}}>+{g.diff}</div>
                </div>
              ))
            }
          </div>
        )}
      </div>

      <div style={{position:"absolute",left:"-9999px"}}>
        <div ref={pdfRef} className="pdf-content">
          <h1 style={{textAlign:"center",fontSize:32}}>TABELA DE CLASSIFICAÇÃO - {data.name}</h1>
          <table className="pdf-table">
            <thead><tr><th>POS</th><th>JOGADOR</th><th>J</th><th>PTS</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead>
            <tbody>
              {getStats(data.players,data.results).map(([p,s],i)=>(
                <tr key={p}><td>{i+1}º</td><td align="left">{p}</td><td>{s.j}</td><td>{s.pts}</td><td>{s.v}</td><td>{s.e}</td><td>{s.d}</td><td>{s.gp}</td><td>{s.gc}</td><td>{s.sg}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── Root ──────────────────────────────────────────────────────────────────────
function Root(){
  const [screen,setScreen]=useState("home");
  const [active,setActive]=useState(null);
  if(screen==="home") return <HomeScreen onNew={()=>setScreen("setup")} onLoad={t=>{setActive(t);setScreen("tournament");}}/>;
  if(screen==="setup") return <SetupScreen onBack={()=>setScreen("home")} onStart={t=>{setActive(t);setScreen("tournament");}}/>;
  if(screen==="tournament") return <TournamentApp tournament={active} onBack={()=>setScreen("home")}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
